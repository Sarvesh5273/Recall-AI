name: Backend CI

on:
  push:
    branches: [main]
    paths: ['backend/**']
  pull_request:
    branches: [main]
    paths: ['backend/**']

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Lint with ruff
        run: ruff check . --output-format=github

      - name: Run tests
        env:
          JWT_SECRET: ci-test-secret
          COSMOS_DB_ENDPOINT: https://test.documents.azure.com
          COSMOS_DB_KEY: dGVzdC1rZXk=
          COSMOS_DB_DATABASE_NAME: test-db
          COSMOS_DB_CONTAINER_NAME: test-container
          AZURE_STORAGE_CONNECTION_STRING: DefaultEndpointsProtocol=https;AccountName=test
          AZURE_STORAGE_CONTAINER_NAME: test-images
          TWILIO_ACCOUNT_SID: ACtest
          TWILIO_AUTH_TOKEN: test-token
          TWILIO_PHONE_NUMBER: "+15555555555"
          SARVAM_API_KEY: test-key
          AZURE_OPENAI_ENDPOINT: https://test.openai.azure.com
          AZURE_OPENAI_KEY: test-key
          ALLOWED_ORIGINS: http://localhost:8081
        run: pytest tests/ -v --tb=short

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t recall-ai-backend:${{ github.sha }} ./backend

      - name: Verify health check in container
        run: |
          echo "Docker image built successfully: recall-ai-backend:${{ github.sha }}"
